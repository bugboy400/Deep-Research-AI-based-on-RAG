<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep RAG Chat</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1e1e1e;
  font-family: Arial;
}

.chat-container {
  width: 80%;
  height: 90%;
  display: flex;
  flex-direction: column;
  background: #2a2a2a;
  border-radius: 12px;
  overflow: hidden;
}

.messages {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  padding: 10px 14px;
  border-radius: 10px;
  margin: 5px 0;
  max-width: 70%;
  word-wrap: break-word;
}

.sent {
  background: #d1e7ff;
  color: black;
  margin-left: auto;
}

.received {
  background: #ffffff;
  color: black;
  margin-right: auto;
}

.file {
  background: #e2e2e2;
  margin-left: auto;
  color: black;
}

.input-area {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-top: 1px solid #444;
  background: #2a2a2a;
}

input[type="text"] {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

.icon-btn {
  background: #444;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}

.icon-btn:hover {
  background: #666;
}
</style>

</head>
<body>

<div class="chat-container">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input type="file" id="fileInput" style="display:none">

```
<!-- Attach -->
<button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>

<!-- Input -->
<input type="text" id="input" placeholder="Type a message..." />

<!-- Send -->
<button class="icon-btn" onclick="sendMessage()">➤</button>
```

  </div>
</div>

<script>
const input = document.getElementById("input");
const messages = document.getElementById("messages");
const fileInput = document.getElementById("fileInput");

// Enter key = send
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

// Show file when selected
fileInput.addEventListener("change", function() {
  const file = fileInput.files[0];
  if (!file) return;

  const msg = document.createElement("div");
  msg.className = "message file";
  msg.textContent = "📎 " + file.name;

  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
});

async function sendMessage() {
  const question = input.value.trim();
  const file = fileInput.files[0];

  if (!question) {
    alert("Please enter a question");
    return;
  }

  // Show user message
  const userMsg = document.createElement("div");
  userMsg.className = "message sent";
  userMsg.textContent = question;
  messages.appendChild(userMsg);

  input.value = "";

  // Loading message
  const loadingMsg = document.createElement("div");
  loadingMsg.className = "message received";
  loadingMsg.textContent = "Thinking...";
  messages.appendChild(loadingMsg);

  messages.scrollTop = messages.scrollHeight;

  const formData = new FormData();
  formData.append("query", question);
  if (file) {
    formData.append("file", file);
  }

  try {
    const response = await fetch("http://localhost:8000/", {
      method: "POST",
      body: formData,
    });

    const data = await response.json();

    // Remove loading
    messages.removeChild(loadingMsg);

    // Show response
    const botMsg = document.createElement("div");
    botMsg.className = "message received";
    botMsg.textContent = data.answer;

    messages.appendChild(botMsg);
    messages.scrollTop = messages.scrollHeight;

  } catch (error) {
    messages.removeChild(loadingMsg);

    const errorMsg = document.createElement("div");
    errorMsg.className = "message received";
    errorMsg.textContent = "❌ Error: Could not connect to server.";

    messages.appendChild(errorMsg);

    console.error("Error:", error);
  }

  // Reset file input
  fileInput.value = "";
}
</script>

</body>
</html>
